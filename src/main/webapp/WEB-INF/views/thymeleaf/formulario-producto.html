<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>Taller Web I</title>

    <!-- Boostrap core css -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.2.0/css/bootstrap.min.css}" />

    <!-- custom style -->
    <link rel="stylesheet" th:href="@{/css/main.css}" />

</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card border-0 shadow-lg">
                    <div class="card-header bg-success text-white py-3">
                        <h4 class="mb-0 fw-bold">
                            <i class="fas fa-plus-circle me-2"></i> Registrar Nuevo Producto
                        </h4>
                    </div>

                    <div class="card-body p-4">
                        <form th:action="@{/guardar-producto}" th:object="${producto}" method="post"
                            enctype="multipart/form-data">

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold text-muted">SKU del Producto</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="fas fa-barcode"></i></span>
                                        <input type="text" th:field="*{sku}" class="form-control border-success"
                                            placeholder="Ej: 9242" required />
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold text-muted">Nombre del Producto</label>
                                    <input type="text" th:field="*{nombre}" class="form-control"
                                        placeholder="Ej: Alfajor de Maicena" required />
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold text-muted">Categoría</label>
                                    <select name="idCategoria" class="form-select" required>
                                        <option value="" selected disabled>Seleccione una categoría...</option>
                                        <option th:each="cat : ${categorias}" th:value="${cat.id}"
                                            th:text="${cat.nombre}">
                                        </option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold text-muted">Precio de Venta</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light fw-bold text-success">$</span>
                                        <input type="number" step="0.01" th:field="*{precio}" class="form-control"
                                            placeholder="0.00" required />
                                    </div>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-bold text-muted">Imagen del Producto</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="fas fa-image"></i></span>
                                    <input type="file" name="archivoImagen" class="form-control" accept="image/*">
                                </div>
                                <small class="text-muted">Formatos sugeridos: JPG, PNG. Máx 2MB.</small>
                            </div>

                            <div th:if="${error}" class="alert alert-danger d-flex align-items-center shadow-sm"
                                role="alert">
                                <i class="fas fa-exclamation-triangle me-2"></i>
                                <div th:text="${error}"></div>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4 border-top pt-3">
                                <a th:href="@{/productos}" class="btn btn-outline-secondary px-4 me-md-2">
                                    <i class="fas fa-arrow-left me-1"></i> Volver
                                </a>
                                <button type="submit" class="btn btn-success px-5 fw-bold shadow-sm">
                                    <i class="fas fa-save me-1"></i> Guardar Producto
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>


</body>

</html>
