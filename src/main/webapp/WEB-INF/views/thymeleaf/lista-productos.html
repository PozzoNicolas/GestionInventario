<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>Taller Web I</title>

    <!-- Boostrap core css -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.2.0/css/bootstrap.min.css}" />

    <!-- custom style -->
    <link rel="stylesheet" th:href="@{/css/main.css}" />

</head>

<body>
    <table class="table">
        <thead>
            <tr>
                <th>SKU</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${productos}">
                <td th:text="${p.sku}">9242</td>
                <td th:text="${p.nombre}">Alfajor</td>
                <td th:text="${p.precio}">$0.00</td>
                <td th:text="${p.stockActual}" th:classappend="${p.stockActual < 5} ? 'text-danger' : ''">0</td>
                <td>
                    <a th:href="@{/editar-producto/{id}(id=${p.id})}" class="btn btn-primary">Editar</a>
                </td>
            </tr>
        </tbody>
    </table>

</body>

</html>
