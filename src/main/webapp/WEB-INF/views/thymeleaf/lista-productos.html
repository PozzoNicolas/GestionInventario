<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>Taller Web I</title>

    <!-- Boostrap core css -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.2.0/css/bootstrap.min.css}" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- custom style -->
    <!-- <link rel="stylesheet" th:href="@{/css/main.css}" />-->

</head>

<body class="m-4">
    <div class="mb-4 mt-3">
        <h2 class="fw-bold text-dark">Gestión de Inventario</h2>
        <a href="nuevo-producto" class="btn btn-primary shadow-sm px-4 py-2">
            <i class="fas fa-plus me-2"></i> Nuevo Producto
        </a>
    </div>
    <table class="table table-hover align-middle shadow-sm bg-white rounded-3 overflow-hidden">
        <thead class="table-light">
            <tr>
                <th>SKU</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Categoria</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${productos}">
                <td th:text="${p.sku}">9242</td>
                <td th:text="${p.nombre}">Alfajor</td>
                <td th:text="${'$ ' + p.precio}">$0.00</td>
                <td th:text="${p.stockActual}" th:classappend="${p.stockActual < 5} ? 'text-danger' : ''">0</td>
                <td th:text="${p.categoria != null ? p.categoria.nombre : 'Sin Categoría'}">Caja</td>


                <td>
                    <button th:if="${p.imagen != null}" type="button" class="btn btn-outline-primary btn-sm"
                        data-bs-toggle="modal" th:data-bs-target="'#modalFoto' + ${p.id}">
                        <i class="bi bi-eye"></i> Ver Imagen
                    </button>
                    <span th:unless="${p.imagen != null}" class="text-muted small">Sin foto</span>

                    <div th:if="${p.imagen != null}" class="modal fade" th:id="'modalFoto' + ${p.id}" tabindex="-1"
                        aria-hidden="true">
                        <div class="modal-dialog modal-dialog-centered">
                            <div class="modal-content shadow border-0">
                                <div class="modal-header bg-dark text-white">
                                    <h5 class="modal-title" th:text="${p.nombre}">Nombre del Producto</h5>
                                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                                        aria-label="Close"></button>
                                </div>
                                <div class="modal-body text-center p-0">
                                    <img th:src="@{/img/{nombre}(nombre=${p.imagen})}" class="img-fluid w-100"
                                        alt="Imagen del producto">
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary"
                                        data-bs-dismiss="modal">Cerrar</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </td>



                <td>
                    <a th:href="@{/preparar-edicion/{id}(id=${p.id})}" class="btn btn-warning">Editar</a>
                </td>
            </tr>
        </tbody>
    </table>
    <div class="modal fade" id="modalEditar" th:classappend="${abrirModal} ? 'show d-block' : ''" tabindex="-1"
        role="dialog" style="background-color: rgba(0,0,0,0.6);">
        <div class="modal-dialog modal-dialog-centered shadow-lg">
            <div class="modal-content border-0">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title font-weight-bold">
                        <i class="fas fa-edit mr-2"></i> Editar Producto
                    </h5>
                    <a th:href="@{/productos}" class="close text-white" style="text-decoration: none;">
                        <span>&times;</span>
                    </a>
                </div>

                <div class="modal-body p-4">
                    <form th:action="@{/guardar-producto}" th:object="${producto}" method="post"
                        enctype="multipart/form-data">

                        <input type="hidden" th:field="*{id}">
                        <input type="hidden" th:field="*{imagen}">

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label font-weight-bold text-muted">SKU</label>
                                <input type="text" th:field="*{sku}" class="form-control border-primary"
                                    placeholder="Ej: 9242">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label font-weight-bold text-muted">Nombre</label>
                                <input type="text" th:field="*{nombre}" class="form-control"
                                    placeholder="Nombre del producto">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label font-weight-bold text-muted">Precio ($)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-success font-weight-bold">$</span>
                                    <input type="number" step="0.01" th:field="*{precio}" class="form-control">
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label font-weight-bold text-muted">Stock Actual</label>
                                <input type="number" th:field="*{stockActual}" class="form-control">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label font-weight-bold text-muted">Categoría</label>
                            <select name="idCategoria" class="form-control custom-select">
                                <option th:each="c : ${categorias}" th:value="${c.id}" th:text="${c.nombre}"
                                    th:selected="${producto.categoria != null && c.id == producto.categoria.id}">
                                </option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label font-weight-bold text-muted">Cambiar Imagen (Opcional)</label>
                            <input type="file" name="archivoImagen" class="form-control">
                            <small class="text-muted">Si no seleccionás nada, se mantendrá la imagen actual.</small>
                        </div>

                        <div class="d-flex justify-content-end gap-2 border-top pt-3">
                            <a th:href="@{/productos}" class="btn btn-outline-secondary px-4 mr-2">Cancelar</a>
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="fas fa-save mr-1"></i> Guardar Cambios
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
